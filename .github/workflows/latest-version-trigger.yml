# ------------------------------------------------------------------------------
# Latest Version Trigger
#
# This workflow is triggered by push to main branch.
# It gets all versions from Git tags and GitHub Releases, finds unreleased versions,
# and triggers release workflow for the latest unreleased version.
#
# Simplified version - does NOT use Nuke VersionMonitor
# ------------------------------------------------------------------------------

name: Latest Version Trigger

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not trigger release workflow)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  actions: write

jobs:
  get-unreleased-versions:
    name: Get Unreleased Versions
    runs-on: ubuntu-latest
    outputs:
      all_versions: ${{ steps.get-versions.outputs.all_versions }}
      unreleased_versions: ${{ steps.get-versions.outputs.unreleased_versions }}
      latest_unreleased: ${{ steps.get-versions.outputs.latest_unreleased }}
      should_trigger: ${{ steps.check.outputs.should_trigger }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get all v* tags from Git
        id: get-versions
        run: |
          echo "Fetching all v* tags from Git..."

          # Get all v* tags, sort by version (newest first)
          ALL_TAGS=$(git tag -l 'v*' --sort=-version:refname 2>/dev/null || echo "")

          echo "All Git tags: $ALL_TAGS"

          # Get GitHub releases
          GH_RELEASES=$(gh release list --json tagName 2>/dev/null || echo "[]")

          echo "GitHub releases: $GH_RELEASES"

          # Find unreleased versions (in Git tags but NOT in GitHub releases)
          UNRELEASED_VERSIONS=""
          for TAG in $ALL_TAGS; do
            # Check if this tag exists in GitHub releases
            if echo "$GH_RELEASES" | grep -q "\"$TAG\""; then
              echo "  Tag $TAG already released"
            else
              UNRELEASED_VERSIONS="$UNRELEASED_VERSIONS,$TAG"
              echo "  Tag $TAG not released (unreleased)"
            fi
          done

          # Remove leading comma if any
          ALL_TAGS_CSV="${UNRELEASED_VERSIONS#,}"

          echo "Unreleased versions: $ALL_TAGS_CSV"

          # Output results
          echo "all_versions=$ALL_TAGS_CSV" >> $GITHUB_OUTPUT
          echo "unreleased_versions=$ALL_TAGS_CSV" >> $GITHUB_OUTPUT

          # Get latest unreleased version (the first one)
          LATEST_UNRELEASED=$(echo "$ALL_TAGS_CSV" | cut -d',' -f1 | head -1)

          if [ -n "$LATEST_UNRELEASED" ]; then
            echo "Latest unreleased version: $LATEST_UNRELEASED"
            echo "latest_unreleased=$LATEST_UNRELEASED" >> $GITHUB_OUTPUT
          else
            echo "No unreleased versions found"
            echo "latest_unreleased=" >> $GITHUB_OUTPUT
          fi

          if [ -n "$LATEST_UNRELEASED" ]; then
            echo "should_trigger=true" >> $GITHUB_OUTPUT
          else
            echo "should_trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for dry run
        id: dry-run-check
        if: steps.get-versions.outputs.should_trigger == 'true'
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "Dry run: $DRY_RUN"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN MODE - Will not trigger release workflow"
            echo "should_trigger=false" >> $GITHUB_OUTPUT
          else
            echo "EXECUTION MODE - Will trigger release workflow"
            echo "should_trigger=true" >> $GITHUB_OUTPUT
          fi

      - name: Output results
        run: |
          echo "=== Latest Version Trigger Results ==="
          echo "Latest unreleased version: ${{ steps.get-versions.outputs.latest_unreleased }}"
          echo "Should trigger: ${{ steps.dry-run-check.outputs.should_trigger }}"
          echo "======================================"

  trigger-release-workflow:
    name: Trigger Release Workflow
    needs: get-unreleased-versions
    if: needs.get-unreleased-versions.outputs.should_trigger == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Trigger GitHub Release Workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.get-unreleased-versions.outputs.latest_unreleased }}
        run: |
          echo "Triggering github-release-workflow.yml for version $VERSION..."
          gh workflow run github-release-workflow.yml \
            -f client_payload="{\"version\":\"$VERSION\"}"

      - name: Trigger Docker Build and Azure Publish Workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.get-unreleased-versions.outputs.latest_unreleased }}
        run: |
          echo "Triggering docker-build-azure-publish.yml for version $VERSION..."
          gh workflow run docker-build-azure-publish.yml \
            -f version="$VERSION" \
            -f test_mode="true"

      - name: Send Feishu Notification
        id: feishu-notify
        uses: HagiCode-org/haginotifier@v1
        if: always()
        with:
          msg_type: 'post'
          title: '触发成功 🚀'
          message: |
            **触发方式**: main 分支推送
            **最新版本**: ${{ needs.get-unreleased-versions.outputs.latest_unreleased }}
            **状态**: ${{ job.status == 'success' && '已触发发布工作流' || '触发失败' }}
            **触发者**: ${{ github.actor }}
            **时间**: ${{ github.event.head_commit.timestamp }}

            **触发的工作流**:
            ${{ job.status == 'success' && '• GitHub Release 工作流' || '' }}
            ${{ job.status == 'success' && '• Docker Build Azure 工作流 (测试模式)' || '' }}

            **说明**:
            此版本将在测试模式下构建，不会触发下游发布（Docker Hub、Aliyun ACR）。

            **链接**:
            • Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            • Latest Version: ${{ needs.get-unreleased-versions.outputs.latest_unreleased }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
