name: Azure to Aliyun Image Sync

on:
  # Trigger 1: Auto-trigger when docker-build.yml completes
  workflow_run:
    workflows: ["Docker Multi-Arch Build and Push to Edge ACR"]
    types: [completed]
    branches: [main]
  # Trigger 2: Manual trigger
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'Version to sync (e.g., v1.2.3 or 1.2.3). Leave empty for latest.'
        required: false
        type: string

env:
  AZURE_ACR_REGISTRY: hagicode.azurecr.io
  AZURE_ACR_USERNAME: ${{ secrets.AZURE_ACR_USERNAME }}
  AZURE_ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD }}
  ALIYUN_ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
  ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
  SOURCE_REGISTRY: hagicode.azurecr.io
  TARGET_REGISTRY: registry.cn-hangzhou.aliyuncs.com

jobs:
  sync:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version to sync
        id: determine-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Get version from workflow_run event
            # Try to extract version from the run metadata
            WORKFLOW_RUN_ID=${{ github.event.workflow_run.id }}

            JOBS_JSON=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
              "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${WORKFLOW_RUN_ID}/jobs")

            # Try to find the version from job outputs or steps
            VERSION=$(echo "$JOBS_JSON" | jq -r '.jobs[]?.steps[]? | select(.name | contains("Determine")) | .name' 2>/dev/null | \
              grep -oP 'v?\d+\.\d+\.\d+' | head -1 || echo "")

            if [ -z "$VERSION" ]; then
              VERSION="latest"
            fi

            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "Sync mode: workflow_run (version: ${VERSION})"
          else
            # workflow_dispatch mode
            VERSION="${{ github.event.inputs.VERSION }}"

            # If no version specified, use latest
            if [ -z "$VERSION" ]; then
              VERSION="latest"
            fi

            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "Sync mode: workflow_dispatch (version: ${VERSION})"
          fi

      - name: Fetch publish result from GitHub Release
        id: fetch-publish-result
        run: |
          VERSION="${{ steps.determine-version.outputs.version }}"

          echo "Fetching Azure publish result for version: ${VERSION}"

          if [ "$VERSION" == "latest" ]; then
            # Get latest release
            RELEASE_DATA=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases/latest")

            if echo "$RELEASE_DATA" | grep -q "Not Found"; then
              echo "Error: No releases found in repository"
              exit 1
            fi

            RELEASE_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
            VERSION=$(echo "$RELEASE_TAG" | sed 's/^v//')
            echo "Latest release tag: ${RELEASE_TAG}, version: ${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          else
            # Ensure version has v prefix for release tag lookup
            RELEASE_TAG="${VERSION}"
            if [[ ! "${RELEASE_TAG}" =~ ^v ]]; then
              RELEASE_TAG="v${RELEASE_TAG}"
            fi

            RELEASE_DATA=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}")

            if echo "$RELEASE_DATA" | grep -q "Not Found"; then
              echo "Error: Release ${RELEASE_TAG} not found"
              exit 1
            fi
          fi

          echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          echo "Found release: ${RELEASE_TAG}"

          # Find and download azure-publish-results-{version}.json
          ASSET_NAME="azure-publish-results-${VERSION}.json"
          ASSET_URL=$(echo "$RELEASE_DATA" | jq -r --arg asset_name "$ASSET_NAME" '.assets[] | select(.name == $asset_name) | .browser_download_url')

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" == "null" ]; then
            echo "Error: Publish result file ${ASSET_NAME} not found in release ${RELEASE_TAG}"
            exit 1
          fi

          echo "Downloading publish result from: ${ASSET_URL}"
          curl -s -o azure-publish-result.json "${ASSET_URL}"

          if [ ! -s "azure-publish-result.json" ]; then
            echo "Error: Failed to download publish result file"
            exit 1
          fi

          echo "publish_result_file=azure-publish-result.json" >> $GITHUB_OUTPUT
          echo "Successfully downloaded publish result file"
          echo "Content:"
          cat azure-publish-result.json

      - name: Parse publish result for image list
        id: parse-images
        run: |
          PUBLISH_RESULT_FILE="${{ steps.fetch-publish-result.outputs.publish_result_file }}"

          echo "Parsing publish result file for Azure images..."

          # Extract Azure registry and images
          AZURE_REGISTRY=$(jq -r '.azure.registry' "$PUBLISH_RESULT_FILE")
          IMAGE_COUNT=$(jq -r '.azure.images | length' "$PUBLISH_RESULT_FILE")

          echo "Azure Registry: ${AZURE_REGISTRY}"
          echo "Number of images: ${IMAGE_COUNT}"

          # Generate version list from images
          VERSIONS=""
          for i in $(seq 0 $((IMAGE_COUNT - 1))); do
            IMAGE_URL=$(jq -r ".azure.images[$i].fullUrl" "$PUBLISH_RESULT_FILE")
            echo "Found image: ${IMAGE_URL}"

            # Extract tag from image URL
            TAG=$(echo "$IMAGE_URL" | sed 's/.*://')
            VERSIONS="${VERSIONS}${VERSIONS:+,}${TAG}"
          done

          echo "azure_registry=${AZURE_REGISTRY}" >> $GITHUB_OUTPUT
          echo "image_versions=${VERSIONS}" >> $GITHUB_OUTPUT
          echo "Versions to sync: ${VERSIONS}"

      - name: Display sync information
        run: |
          echo "=========================================="
          echo "Azure to Aliyun Image Sync"
          echo "=========================================="
          echo "Version: ${{ steps.fetch-publish-result.outputs.version }}"
          echo "Release Tag: ${{ steps.fetch-publish-result.outputs.release_tag }}"
          echo "Azure Registry: ${{ steps.parse-images.outputs.azure_registry }}"
          echo "Target Registry: ${{ env.TARGET_REGISTRY }}"
          echo "Images to sync: ${{ steps.parse-images.outputs.image_versions }}"
          echo "=========================================="

      - name: Login to Azure ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.parse-images.outputs.azure_registry }}
          username: ${{ env.AZURE_ACR_USERNAME }}
          password: ${{ env.AZURE_ACR_PASSWORD }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TARGET_REGISTRY }}
          username: ${{ env.ALIYUN_ACR_USERNAME }}
          password: ${{ env.ALIYUN_ACR_PASSWORD }}

      - name: Setup image-syncer
        run: |
          IMAGE_SYNCER_VERSION="v1.5.5"
          curl -sLo /tmp/image-syncer.tar.gz "https://github.com/AliyunContainerService/image-syncer/releases/download/${IMAGE_SYNCER_VERSION}/image-syncer-${IMAGE_SYNCER_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/image-syncer.tar.gz -C /tmp
          chmod +x /tmp/image-syncer
          echo "image-syncer version: ${IMAGE_SYNCER_VERSION}"

      - name: Generate image-syncer config
        id: config
        run: |
          SOURCE_REGISTRY="${{ steps.parse-images.outputs.azure_registry }}"
          TARGET_REGISTRY="${{ env.TARGET_REGISTRY }}"
          VERSIONS="${{ steps.parse-images.outputs.image_versions }}"

          # Create config.yaml
          cat > config.yaml << EOF
registry:
            # Source registry - Azure ACR
            ${SOURCE_REGISTRY}:
              auth: "${{ env.AZURE_ACR_USERNAME }}:${{ env.AZURE_ACR_PASSWORD }}"
            # Target registry - Aliyun ACR
            ${TARGET_REGISTRY}:
              auth: "${{ env.ALIYUN_ACR_USERNAME }}:${{ env.ALIYUN_ACR_PASSWORD }}"

images:
$(
            IFS=',' read -ra VERSION_ARRAY <<< "$VERSIONS"
            for version in "${VERSION_ARRAY[@]}"; do
              echo "  ${SOURCE_REGISTRY}/hagicode:${version}: ${TARGET_REGISTRY}/hagicode:${version}"
            done
          )
EOF

          echo "Generated config.yaml:"
          cat config.yaml
          echo "versions=${VERSIONS}" >> $GITHUB_OUTPUT

      - name: Sync images
        id: sync
        run: |
          echo "Starting image sync..."
          if /tmp/image-syncer --config config.yaml --arch amd64,arm64 --proc 4; then
            echo "sync_result=success" >> $GITHUB_OUTPUT
            echo "Image sync completed successfully!"
          else
            echo "sync_result=failed" >> $GITHUB_OUTPUT
            echo "Image sync failed!"
            exit 1
          fi

      - name: Verify sync results
        if: success()
        run: |
          VERSIONS="${{ steps.config.outputs.versions }}"
          TARGET_REGISTRY="${{ env.TARGET_REGISTRY }}"
          FAILED=0
          SUCCESS_COUNT=0

          IFS=',' read -ra VERSION_ARRAY <<< "$VERSIONS"
          for version in "${VERSION_ARRAY[@]}"; do
            echo "Verifying ${TARGET_REGISTRY}/hagicode:${version}..."
            RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${TARGET_REGISTRY}/v2/hagicode/manifests/${version}" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              -u "${{ env.ALIYUN_ACR_USERNAME }}:${{ env.ALIYUN_ACR_PASSWORD }}")

            if [ "$RESULT" == "200" ]; then
              echo "✓ hagicode:${version} synced successfully"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              echo "✗ hagicode:${version} verification failed (HTTP $RESULT)"
              FAILED=1
            fi
          done

          echo "=========================================="
          echo "Verification Summary"
          echo "=========================================="
          echo "Total: ${#VERSION_ARRAY[@]}, Success: ${SUCCESS_COUNT}, Failed: ${FAILED}"

      - name: Success notification
        if: success()
        run: |
          echo "=========================================="
          echo "Image sync completed successfully!"
          echo "=========================================="
          echo "Version: ${{ steps.fetch-publish-result.outputs.version }}"
          echo "Images: ${{ steps.config.outputs.versions }}"
          echo "=========================================="

      - name: Failure notification
        if: failure()
        run: |
          WEBHOOK_URL="${{ secrets.FEISHU_WEBHOOK_URL }}"
          if [ -n "$WEBHOOK_URL" ]; then
            echo "Sending failure notification..."
            PAYLOAD=$(cat <<EOF
            {
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": {"tag": "plain_text", "content": "⚠️ Image Sync Failed"},
                  "template": "red"
                },
                "elements": [
                  {
                    "tag": "markdown",
                    "content": "**Azure to Aliyun Image Sync Failed**\n\n**Version:** ${{ steps.fetch-publish-result.outputs.version }}\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            }
            EOF
            )
            curl -s -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
            echo "Notification sent!"
          else
            echo "FEISHU_WEBHOOK_URL not configured, skipping notification"
          fi
          exit 1