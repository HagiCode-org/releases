name: Docker Multi-Arch Build and Push to Edge ACR

# This workflow supports three trigger mechanisms:
#
# 1. Tag Push (e.g., v1.2.3) - Builds when a new version tag is pushed
# 2. Main Branch Push - Builds latest for testing when main branch is updated
# 3. workflow_dispatch - Manual trigger with optional version/platform inputs
# 4. repository_dispatch (version-monitor-docker) - Automatic trigger from version monitor
#
# Version Resolution Priority (for steps.config outputs):
#   1. workflow_dispatch input: version parameter
#   2. repository_dispatch: github.event.client_payload.version (from version monitor)
#   3. Git tag push: extract version from tag ref
#   4. Branch push: use "latest" for testing
#   5. Default: "latest"
#
# The repository_dispatch trigger (type: version-monitor-docker) is used by the
# version monitor to automatically trigger Docker builds when new versions are detected.
# This follows the same pattern as the github-release-workflow.yml.

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.3)'
        required: false
        type: string
      platform:
        description: 'Docker platform (all, linux-amd64, linux-arm64)'
        required: false
        type: choice
        default: all
        options:
          - all
          - linux-amd64
          - linux-arm64
      dry_run:
        description: 'Dry run mode (do not push to registry)'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [version-monitor-docker]
    inputs:
      version:
        description: 'Version to build (passed from version monitor)'
        required: false

env:
  DOTNET_VERSION: '10.0'
  DOTNET_INSTALL_DIR: '/usr/share/dotnet'

jobs:
  docker-build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Docker Buildx
        run: |
          docker version
          docker buildx version
          docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Setup Buildx Builder
        run: |
          docker buildx create --name hagicode-multiarch --driver docker-container --use || true

      - name: Login to Edge ACR
        if: inputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_REGISTRY }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Determine Version and Platform
        id: config
        run: |
          # Determine version - priority order:
          # 1. workflow_dispatch input (manual trigger)
          # 2. repository_dispatch client_payload (version monitor trigger)
          # 3. Git tag push
          # 4. Branch push (defaults to 'latest')
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using manual version from workflow_dispatch: ${VERSION}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            echo "Using version from repository_dispatch: ${VERSION}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Check if it's a tag push
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              VERSION=${GITHUB_REF#refs/tags/}
              if [ -z "${VERSION}" ]; then
                VERSION="latest"
              fi
              echo "Using tag version: ${VERSION}"
            else
              # Branch push (not a tag) - use latest for testing
              VERSION="latest"
              echo "Branch push detected - using latest for testing"
            fi
          else
            VERSION="latest"
            echo "Using default version: ${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Determine platform - default to 'all' if not specified
          if [ -z "${{ inputs.platform }}" ]; then
            # When platform is not specified or empty, default to 'all'
            PLATFORM="all"
            echo "Using default platform: ${PLATFORM}"
          else
            PLATFORM="${{ inputs.platform }}"
            echo "Using specified platform: ${PLATFORM}"
          fi
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT

      - name: Build Base Images
        if: steps.config.outputs.version != 'latest'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          PLATFORM="${{ steps.config.outputs.platform }}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"
          DRY_RUN="${{ inputs.dry_run }}"

          echo "Building base images for platform: ${PLATFORM}, version: ${VERSION}"
          echo "Dry run: ${DRY_RUN}"

          if [ "${PLATFORM}" = "all" ]; then
            # Multi-arch build - only push to Edge ACR
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:base \
              --file docker_deployment/Dockerfile.base \
              --output type=registry \
              docker_deployment/
          elif [ "${PLATFORM}" = "linux-amd64" ]; then
            # AMD64 only
            docker buildx build \
              --platform linux/amd64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:base \
              --file docker_deployment/Dockerfile.base \
              --load \
              docker_deployment/

            if [ "${{ inputs.dry_run }}" != "true" ]; then
              docker push ${REGISTRY}/${IMAGE_NAME}:base
            fi
          elif [ "${PLATFORM}" = "linux-arm64" ]; then
            # ARM64 only
            docker buildx build \
              --platform linux/arm64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:base \
              --file docker_deployment/Dockerfile.base.arm64 \
              --load \
              docker_deployment/

            if [ "${{ inputs.dry_run }}" != "true" ]; then
              docker push ${REGISTRY}/${IMAGE_NAME}:base
            fi
          fi

      - name: Download and Extract Application
        if: steps.config.outputs.version != 'latest'
        env:
          AZURE_BLOB_SAS_URL: ${{ secrets.AZURE_BLOB_SAS_URL }}
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          mkdir -p output/download

          # Download packages from Azure Blob Storage
          echo "Downloading packages for version ${VERSION}..."
          # Note: In a real scenario, you would use the Azure Blob download logic here
          # For this workflow, we assume packages are already downloaded or use mock data

          # Create mock lib directory for testing purposes
          # In production, this would be populated from Azure Blob Storage
          mkdir -p output/download/lib
          echo "# Mock application library" > output/download/lib/README.txt
          echo "Mock application files for testing" > output/download/lib/test.txt
          echo "Created mock lib directory for testing"

      - name: Build Application Images
        if: steps.config.outputs.version != 'latest'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          PLATFORM="${{ steps.config.outputs.platform }}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          BASE_IMAGE="${REGISTRY}/${IMAGE_NAME}:base"

          echo "Building application images for version: ${VERSION}, platform: ${PLATFORM}"

          # Generate Dockerfile from template
          mkdir -p output/docker-build-context
          cat docker_deployment/Dockerfile.app.template | \
            sed "s|{version}|${VERSION}|g" | \
            sed "s|{build_date}|${BUILD_DATE}|g" | \
            sed "s|{base_image_name}|${BASE_IMAGE}|g" \
            > output/docker-build-context/Dockerfile.app

          # Copy application files from download to build context
          cp -r output/download/lib output/docker-build-context/
          # Copy entrypoint script
          cp docker_deployment/docker-entrypoint.sh output/docker-build-context/
          chmod +x output/docker-build-context/docker-entrypoint.sh

          if [ "${PLATFORM}" = "all" ]; then
            # Multi-arch build with push to registry - only use Edge ACR
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:${VERSION} \
              --file output/docker-build-context/Dockerfile.app \
              --output type=registry \
              output/docker-build-context/

            echo "Multi-arch build completed for version: ${VERSION}"
          else
            # Single platform build
            docker buildx build \
              --platform ${PLATFORM} \
              --tag ${REGISTRY}/${IMAGE_NAME}:${VERSION} \
              --file output/docker-build-context/Dockerfile.app \
              --load \
              output/docker-build-context/

            echo "Single platform build completed: ${PLATFORM} for version: ${VERSION}"

            if [ "${{ inputs.dry_run }}" != "true" ]; then
              docker push ${REGISTRY}/${IMAGE_NAME}:${VERSION}
              echo "Image pushed: ${REGISTRY}/${IMAGE_NAME}:${VERSION}"
            fi
          fi

      - name: Push Additional Tags
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"

          # Parse version parts
          MAJOR=$(echo ${VERSION} | cut -d. -f1)
          MINOR=$(echo ${VERSION} | cut -d. -f2)

          # For multi-arch images pushed with --output type=registry, we can't tag locally
          # Instead, we use docker manifest to verify tags exist
          # The manifest tool automatically handles cross-repo tagging

          # Push minor version tag using manifest (works with multi-arch)
          docker buildx imagetools create -t ${REGISTRY}/${IMAGE_NAME}:${MAJOR}.${MINOR} ${REGISTRY}/${IMAGE_NAME}:${VERSION}
          echo "Pushed minor tag: ${REGISTRY}/${IMAGE_NAME}:${MAJOR}.${MINOR}"

          # Push major version tag using manifest
          docker buildx imagetools create -t ${REGISTRY}/${IMAGE_NAME}:${MAJOR} ${REGISTRY}/${IMAGE_NAME}:${VERSION}
          echo "Pushed major tag: ${REGISTRY}/${IMAGE_NAME}:${MAJOR}"

          # Push latest tag only for stable releases (not pre-release like rc, beta, alpha)
          # Check if version contains pre-release suffixes
          if [[ ! ${VERSION} =~ ^(rc|beta|alpha|preview|dev)[0-9]*$ ]] && [[ ! ${VERSION} =~ -(rc|beta|alpha|preview|dev) ]]; then
            docker buildx imagetools create -t ${REGISTRY}/${IMAGE_NAME}:latest ${REGISTRY}/${IMAGE_NAME}:${VERSION}
            echo "Pushed latest tag: ${REGISTRY}/${IMAGE_NAME}:latest"
          else
            echo "Skipped latest tag - pre-release version detected: ${VERSION}"
          fi

      - name: Verify Images in Registry
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"

          echo "Verifying images in registry..."

          docker manifest inspect ${REGISTRY}/${IMAGE_NAME}:${VERSION} || echo "Warning: Failed to verify version tag"
          docker manifest inspect ${REGISTRY}/${IMAGE_NAME}:latest || echo "Warning: Failed to verify latest tag"

      - name: Post Login to Edge ACR
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_REGISTRY }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}
          logout: true

      - name: Post Setup .NET SDK
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        uses: actions/setup-dotnet@v4

      - name: Post Checkout code
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        uses: actions/checkout@v4

      - name: Summary
        if: steps.config.outputs.version != 'latest'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          PLATFORM="${{ steps.config.outputs.platform }}"
          DRY_RUN="${{ inputs.dry_run }}"

          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${PLATFORM}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: ${DRY_RUN}" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: ${{ secrets.AZURE_ACR_REGISTRY }}" >> $GITHUB_STEP_SUMMARY

          if [ "${VERSION}" = "latest" ]; then
            echo "- **Status**: Test mode (no images built)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: Build and push completed" >> $GITHUB_STEP_SUMMARY
          fi
