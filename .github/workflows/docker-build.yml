name: Docker Multi-Arch Build and Push to Edge ACR

# This workflow supports three trigger mechanisms:
#
# 1. Tag Push (e.g., v1.2.3) - Builds when a new version tag is pushed
# 2. Main Branch Push - Builds latest for testing when main branch is updated
# 3. workflow_dispatch - Manual trigger with optional version/platform inputs
# 4. repository_dispatch (version-monitor-docker) - Automatic trigger from version monitor
#
# Version Resolution Priority (for steps.config outputs):
#   1. workflow_dispatch input: version parameter
#   2. repository_dispatch: github.event.client_payload.version (from version monitor)
#   3. Git tag push: extract version from tag ref
#   4. Branch push: use "latest" for testing
#   5. Default: "latest"
#
# The repository_dispatch trigger (type: version-monitor-docker) is used by the
# version monitor to automatically trigger Docker builds when new versions are detected.
# This follows the same pattern as the github-release-workflow.yml.

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.2.3)'
        required: false
        type: string
      platform:
        description: 'Docker platform (all, linux-amd64, linux-arm64)'
        required: false
        type: choice
        default: all
        options:
          - all
          - linux-amd64
          - linux-arm64
      dry_run:
        description: 'Dry run mode (do not push to registry)'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [version-monitor-docker]
    inputs:
      version:
        description: 'Version to build (passed from version monitor)'
        required: false

permissions:
  contents: write  # Required for uploading release assets

env:
  DOTNET_VERSION: '10.0'
  DOTNET_INSTALL_DIR: '/usr/share/dotnet'
  # Azure ACR configuration
  AZURE_ACR_REGISTRY: hagicode.azurecr.io
  # Aliyun ACR configuration
  ALIYUN_ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_ACR_NAMESPACE: hagicode

jobs:
  docker-build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Docker Buildx
        run: |
          docker version
          docker buildx version
          docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Setup Buildx Builder
        run: |
          docker buildx create --name hagicode-multiarch --driver docker-container --use || true

      - name: Login to Edge ACR
        if: inputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_REGISTRY }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Determine Version and Platform
        id: config
        run: |
          # Determine version - priority order:
          # 1. workflow_dispatch input (manual trigger)
          # 2. repository_dispatch client_payload (version monitor trigger)
          # 3. Git tag push
          # 4. Branch push (defaults to 'latest')
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using manual version from workflow_dispatch: ${VERSION}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.version }}" ]; then
            VERSION="${{ github.event.client_payload.version }}"
            echo "Using version from repository_dispatch: ${VERSION}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Check if it's a tag push
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              VERSION=${GITHUB_REF#refs/tags/}
              if [ -z "${VERSION}" ]; then
                VERSION="latest"
              fi
              echo "Using tag version: ${VERSION}"
            else
              # Branch push (not a tag) - use latest for testing
              VERSION="latest"
              echo "Branch push detected - using latest for testing"
            fi
          else
            VERSION="latest"
            echo "Using default version: ${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Version format validation (skip for 'latest')
          if [ "${VERSION}" != "latest" ]; then
            # Version must start with a digit and contain only letters, numbers, dots, hyphens, or underscores
            if ! [[ "${VERSION}" =~ ^[0-9][0-9A-Za-z._-]*$ ]]; then
              echo "::error::Invalid version format '${VERSION}'"
              echo "Version must start with a digit and only contain letters, numbers, dots, hyphens, or underscores."
              echo "Example: 1.2.3, 1.2.3-beta.1"
              exit 1
            fi
            echo "✓ Version format validated: ${VERSION}"
          fi

          # Determine platform - default to 'all' if not specified
          if [ -z "${{ inputs.platform }}" ]; then
            # When platform is not specified or empty, default to 'all'
            PLATFORM="all"
            echo "Using default platform: ${PLATFORM}"
          else
            # Convert platform format from "linux-amd64" to "linux/amd64" for Docker buildx
            RAW_PLATFORM="${{ inputs.platform }}"
            case "${RAW_PLATFORM}" in
              "linux-amd64") PLATFORM="linux/amd64" ;;
              "linux-arm64") PLATFORM="linux/arm64" ;;
              "all") PLATFORM="all" ;;
              *) PLATFORM="${RAW_PLATFORM}" ;;
            esac
            echo "Using specified platform: ${PLATFORM}"
          fi
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT

      - name: Build Base Images
        if: steps.config.outputs.version != 'latest'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          PLATFORM="${{ steps.config.outputs.platform }}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"
          DRY_RUN="${{ inputs.dry_run }}"

          echo "Building base images for platform: ${PLATFORM}, version: ${VERSION}"
          echo "Dry run: ${DRY_RUN}"

          if [ "${PLATFORM}" = "all" ]; then
            # Multi-arch build - only push to Edge ACR
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:base \
              --file docker_deployment/Dockerfile.base \
              --output type=registry \
              docker_deployment/
          elif [ "${PLATFORM}" = "linux-amd64" ]; then
            # AMD64 only
            docker buildx build \
              --platform linux/amd64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:base \
              --file docker_deployment/Dockerfile.base \
              --load \
              docker_deployment/

            if [ "${{ inputs.dry_run }}" != "true" ]; then
              docker push ${REGISTRY}/${IMAGE_NAME}:base
            fi
          elif [ "${PLATFORM}" = "linux-arm64" ]; then
            # ARM64 only
            docker buildx build \
              --platform linux/arm64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:base \
              --file docker_deployment/Dockerfile.base.arm64 \
              --load \
              docker_deployment/

            if [ "${{ inputs.dry_run }}" != "true" ]; then
              docker push ${REGISTRY}/${IMAGE_NAME}:base
            fi
          fi

      - name: Download and Extract Application
        if: steps.config.outputs.version != 'latest'
        env:
          AZURE_BLOB_SAS_URL: ${{ secrets.AZURE_BLOB_SAS_URL }}
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          mkdir -p output/download

          # Download packages from Azure Blob Storage
          echo "Downloading packages for version ${VERSION}..."
          # Note: In a real scenario, you would use the Azure Blob download logic here
          # For this workflow, we assume packages are already downloaded or use mock data

          # Create mock lib directory for testing purposes
          # In production, this would be populated from Azure Blob Storage
          mkdir -p output/download/lib
          echo "# Mock application library" > output/download/lib/README.txt
          echo "Mock application files for testing" > output/download/lib/test.txt
          echo "Created mock lib directory for testing"

      - name: Build Application Images
        if: steps.config.outputs.version != 'latest'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          # Remove v prefix for Docker image tags (for backward compatibility with tag push trigger)
          CLEAN_VERSION="${VERSION#v}"
          PLATFORM="${{ steps.config.outputs.platform }}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          BASE_IMAGE="${REGISTRY}/${IMAGE_NAME}:base"

          echo "Building application images for version: ${VERSION}, platform: ${PLATFORM}"

          # Generate Dockerfile from template
          mkdir -p output/docker-build-context
          cat docker_deployment/Dockerfile.app.template | \
            sed "s|{version}|${CLEAN_VERSION}|g" | \
            sed "s|{build_date}|${BUILD_DATE}|g" | \
            sed "s|{base_image_name}|${BASE_IMAGE}|g" \
            > output/docker-build-context/Dockerfile.app

          # Copy application files from download to build context
          cp -r output/download/lib output/docker-build-context/
          # Copy entrypoint script
          cp docker_deployment/docker-entrypoint.sh output/docker-build-context/
          chmod +x output/docker-build-context/docker-entrypoint.sh

          if [ "${PLATFORM}" = "all" ]; then
            # Multi-arch build with push to registry - only use Edge ACR
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag ${REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION} \
              --file output/docker-build-context/Dockerfile.app \
              --output type=registry \
              output/docker-build-context/

            echo "Multi-arch build completed for version: ${CLEAN_VERSION}"
          else
            # Single platform build
            docker buildx build \
              --platform ${PLATFORM} \
              --tag ${REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION} \
              --file output/docker-build-context/Dockerfile.app \
              --load \
              output/docker-build-context/

            echo "Single platform build completed: ${PLATFORM} for version: ${CLEAN_VERSION}"

            if [ "${{ inputs.dry_run }}" != "true" ]; then
              docker push ${REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
              echo "Image pushed: ${REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}"
            fi
          fi

      - name: Push Additional Tags
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          # Remove v prefix for tag operations (for backward compatibility with tag push trigger)
          CLEAN_VERSION="${VERSION#v}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"

          # Parse version parts from clean version
          MAJOR=$(echo ${CLEAN_VERSION} | cut -d. -f1)
          MINOR=$(echo ${CLEAN_VERSION} | cut -d. -f2)

          # For multi-arch images pushed with --output type=registry, we can't tag locally
          # Instead, we use docker manifest to verify tags exist
          # The manifest tool automatically handles cross-repo tagging

          # Push minor version tag using manifest (works with multi-arch)
          docker buildx imagetools create -t ${REGISTRY}/${IMAGE_NAME}:${MAJOR}.${MINOR} ${REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
          echo "Pushed minor tag: ${REGISTRY}/${IMAGE_NAME}:${MAJOR}.${MINOR}"

          # Push major version tag using manifest
          docker buildx imagetools create -t ${REGISTRY}/${IMAGE_NAME}:${MAJOR} ${REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
          echo "Pushed major tag: ${REGISTRY}/${IMAGE_NAME}:${MAJOR}"

          # Push latest tag only for stable releases (not pre-release like rc, beta, alpha)
          # Check if version contains pre-release suffixes
          if [[ ! ${CLEAN_VERSION} =~ ^(rc|beta|alpha|preview|dev)[0-9]*$ ]] && [[ ! ${CLEAN_VERSION} =~ -(rc|beta|alpha|preview|dev) ]]; then
            docker buildx imagetools create -t ${REGISTRY}/${IMAGE_NAME}:latest ${REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
            echo "Pushed latest tag: ${REGISTRY}/${IMAGE_NAME}:latest"
          else
            echo "Skipped latest tag - pre-release version detected: ${CLEAN_VERSION}"
          fi

      - name: Verify Images in Registry
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          IMAGE_NAME="hagicode"
          REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"

          echo "Verifying images in registry..."

          # Wait for ACR propagation - manifests may take a few seconds to be available
          echo "Waiting for ACR to propagate images..."
          for TAG in "${VERSION}" "${MAJOR}.${MINOR}" "${MAJOR}"; do
            ATTEMPT=0
            MAX_ATTEMPTS=10
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              # Extract architecture list from manifest using jq
              # jq is required for parsing JSON output of docker manifest inspect
              ARCHITECTURES=$(docker manifest inspect ${REGISTRY}/${IMAGE_NAME}:${TAG} 2>/dev/null | jq -r '.[].Platform[].architecture' 2>/dev/null || echo "")

              if [ -n "${ARCHITECTURES}" ]; then
                echo "✓ Tag ${TAG} is ready (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
                break
              fi

              ATTEMPT=$((ATTEMPT + 1))
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Tag ${TAG} not ready yet, waiting... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
                sleep 3
              fi
            done

            if [ -z "${ARCHITECTURES}" ]; then
              echo "::error::Timed out waiting for tag ${TAG} to become available in ACR"
              echo "This may indicate a propagation delay or the image was not successfully pushed."
              exit 1
            fi
          done

          echo "All tags verified to be available in ACR"
          echo ""

          # Parse version parts for tag verification
          MAJOR=$(echo ${VERSION} | cut -d. -f1)
          MINOR=$(echo ${VERSION} | cut -d. -f2)

          # Multi-architecture verification requirements:
          # - All published images MUST contain both linux/amd64 and linux/arm64 architectures
          # - Verification is done for each tag: version, major.minor, major, and latest (if stable)
          # - If either architecture is missing, the workflow fails with a clear error message
          # - This ensures users on both AMD64 and ARM64 platforms can pull compatible images

          # Verify image architectures for each tag
          for TAG in "${VERSION}" "${MAJOR}.${MINOR}" "${MAJOR}"; do
            echo "Verifying architectures for tag: ${TAG}"

            # Extract architecture list from manifest using jq
            # jq is required for parsing the JSON output of docker manifest inspect
            ARCHITECTURES=$(docker manifest inspect ${REGISTRY}/${IMAGE_NAME}:${TAG} 2>/dev/null | jq -r '.[].Platform[].architecture' 2>/dev/null || echo "")

            if [ -z "${ARCHITECTURES}" ]; then
              echo "::error::Failed to inspect manifest for tag ${TAG}"
              exit 1
            fi

            echo "Found architectures for tag ${TAG}: ${ARCHITECTURES}"

            # Check if amd64 is present (required for AMD64/x86_64 platforms)
            if ! echo "${ARCHITECTURES}" | grep -q "amd64"; then
              echo "::error::Tag ${TAG} does not contain amd64 architecture"
              exit 1
            fi

            # Check if arm64 is present (required for ARM64/AArch64 platforms)
            if ! echo "${ARCHITECTURES}" | grep -q "arm64"; then
              echo "::error::Tag ${TAG} does not contain arm64 architecture"
              exit 1
            fi

            echo "✓ Tag ${TAG} contains both amd64 and arm64 architectures"
          done

          # Verify latest tag only for stable releases
          if [[ ! ${VERSION} =~ ^(rc|beta|alpha|preview|dev)[0-9]*$ ]] && [[ ! ${VERSION} =~ -(rc|beta|alpha|preview|dev) ]]; then
            echo "Verifying tag: latest"
            ARCHITECTURES=$(docker manifest inspect ${REGISTRY}/${IMAGE_NAME}:latest 2>/dev/null | jq -r '.[].Platform[].architecture' 2>/dev/null || echo "")

            if [ -z "${ARCHITECTURES}" ]; then
              echo "::warning::Failed to inspect manifest for tag latest (may not exist)"
            else
              echo "Found architectures for tag latest: ${ARCHITECTURES}"

              if ! echo "${ARCHITECTURES}" | grep -q "amd64" || ! echo "${ARCHITECTURES}" | grep -q "arm64"; then
                echo "::error::Tag latest does not contain both amd64 and arm64 architectures"
                exit 1
              fi

              echo "✓ Tag latest contains both amd64 and arm64 architectures"
            fi
          fi

          echo "All image tags verified successfully!"

      - name: Post Login to Edge ACR
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_REGISTRY }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}
          logout: true

      - name: Login to Aliyun ACR
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Push Images to Aliyun ACR
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          # Remove v prefix for Docker image tags (for backward compatibility with tag push trigger)
          CLEAN_VERSION="${VERSION#v}"
          IMAGE_NAME="hagicode"
          AZURE_REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"
          ALIYUN_REGISTRY="${{ env.ALIYUN_ACR_REGISTRY }}"
          ALIYUN_NAMESPACE="${{ env.ALIYUN_ACR_NAMESPACE }}"
          ALIYUN_IMAGE_NAME="${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/${IMAGE_NAME}"

          # Parse version parts from clean version
          MAJOR=$(echo ${CLEAN_VERSION} | cut -d. -f1)
          MINOR=$(echo ${CLEAN_VERSION} | cut -d. -f2)

          # Check if this is a stable release (not pre-release)
          IS_STABLE=true
          if [[ ${CLEAN_VERSION} =~ ^(rc|beta|alpha|preview|dev)[0-9]*$ ]] || [[ ${CLEAN_VERSION} =~ -(rc|beta|alpha|preview|dev) ]] || [[ ${CLEAN_VERSION} =~ (rc|beta|alpha|preview|dev)- ]]; then
            IS_STABLE=false
          fi

          echo "Pushing images to Aliyun ACR..."
          echo "Version: ${CLEAN_VERSION}, Stable: ${IS_STABLE}"

          # Push base image to Aliyun ACR
          echo "Pushing base image to Aliyun ACR..."
          docker buildx imagetools create -t ${ALIYUN_IMAGE_NAME}:base ${AZURE_REGISTRY}/${IMAGE_NAME}:base
          echo "Base image pushed to Aliyun ACR"

          # Push version tag to Aliyun ACR
          echo "Pushing version tag ${CLEAN_VERSION} to Aliyun ACR..."
          docker buildx imagetools create -t ${ALIYUN_IMAGE_NAME}:${CLEAN_VERSION} ${AZURE_REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
          echo "Version tag pushed to Aliyun ACR"

          # Push major.minor tag to Aliyun ACR
          echo "Pushing major.minor tag ${MAJOR}.${MINOR} to Aliyun ACR..."
          docker buildx imagetools create -t ${ALIYUN_IMAGE_NAME}:${MAJOR}.${MINOR} ${AZURE_REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
          echo "Major.minor tag pushed to Aliyun ACR"

          # Push major tag to Aliyun ACR
          echo "Pushing major tag ${MAJOR} to Aliyun ACR..."
          docker buildx imagetools create -t ${ALIYUN_IMAGE_NAME}:${MAJOR} ${AZURE_REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
          echo "Major tag pushed to Aliyun ACR"

          # Push latest tag only for stable releases
          if [ "$IS_STABLE" = "true" ]; then
            echo "Pushing latest tag to Aliyun ACR..."
            docker buildx imagetools create -t ${ALIYUN_IMAGE_NAME}:latest ${AZURE_REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}
            echo "Latest tag pushed to Aliyun ACR"
          else
            echo "Skipped latest tag - pre-release version detected: ${CLEAN_VERSION}"
          fi

          echo "All images pushed to Aliyun ACR successfully!"

      - name: Verify Images in Aliyun ACR
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          CLEAN_VERSION="${VERSION#v}"
          IMAGE_NAME="hagicode"
          ALIYUN_REGISTRY="${{ env.ALIYUN_ACR_REGISTRY }}"
          ALIYUN_NAMESPACE="${{ env.ALIYUN_ACR_NAMESPACE }}"
          ALIYUN_IMAGE_NAME="${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/${IMAGE_NAME}"

          # Parse version parts
          MAJOR=$(echo ${CLEAN_VERSION} | cut -d. -f1)
          MINOR=$(echo ${CLEAN_VERSION} | cut -d. -f2)

          # Check if this is a stable release
          IS_STABLE=true
          if [[ ${CLEAN_VERSION} =~ ^(rc|beta|alpha|preview|dev)[0-9]*$ ]] || [[ ${CLEAN_VERSION} =~ -(rc|beta|alpha|preview|dev) ]] || [[ ${CLEAN_VERSION} =~ (rc|beta|alpha|preview|dev)- ]]; then
            IS_STABLE=false
          fi

          echo "Verifying images in Aliyun ACR..."

          # Wait for Aliyun ACR propagation - manifests may take a few seconds to be available
          echo "Waiting for Aliyun ACR to propagate images..."
          for TAG in "${TAGS[@]}"; do
            ATTEMPT=0
            MAX_ATTEMPTS=10
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              # Extract architecture list from manifest using jq
              ARCHITECTURES=$(docker manifest inspect ${ALIYUN_IMAGE_NAME}:${TAG} 2>/dev/null | jq -r '.[].Platform[].architecture' 2>/dev/null || echo "")

              if [ -n "${ARCHITECTURES}" ]; then
                echo "✓ Tag ${TAG} is ready (attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
                break
              fi

              ATTEMPT=$((ATTEMPT + 1))
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Tag ${TAG} not ready yet, waiting... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
                sleep 3
              fi
            done

            if [ -z "${ARCHITECTURES}" ]; then
              echo "::error::Timed out waiting for tag ${TAG} to become available in Aliyun ACR"
              echo "This may indicate a propagation delay or the image was not successfully pushed."
              exit 1
            fi
          done

          echo "All tags verified to be available in Aliyun ACR"
          echo ""

          # Multi-architecture verification for Aliyun ACR:
          # - Same requirements as Azure ACR: both amd64 and arm64 must be present
          # - Verified for all pushed tags: version, major.minor, major, and latest (if stable)
          # - Ensures Aliyun ACR images are also multi-arch compatible

          # Define tags to verify
          TAGS=("${CLEAN_VERSION}" "${MAJOR}.${MINOR}" "${MAJOR}")
          if [ "$IS_STABLE" = "true" ]; then
            TAGS+=("latest")
          fi

          # Verify each tag's architectures
          for TAG in "${TAGS[@]}"; do
            echo "Verifying architectures for tag: ${TAG}"

            # Extract architecture list from manifest using jq
            ARCHITECTURES=$(docker manifest inspect ${ALIYUN_IMAGE_NAME}:${TAG} 2>/dev/null | jq -r '.[].Platform[].architecture' 2>/dev/null || echo "")

            if [ -z "${ARCHITECTURES}" ]; then
              echo "::error::Failed to inspect manifest for tag ${TAG} in Aliyun ACR"
              exit 1
            fi

            echo "Found architectures for tag ${TAG}: ${ARCHITECTURES}"

            # Check if amd64 is present (required for AMD64/x86_64 platforms)
            if ! echo "${ARCHITECTURES}" | grep -q "amd64"; then
              echo "::error::Tag ${TAG} in Aliyun ACR does not contain amd64 architecture"
              exit 1
            fi

            # Check if arm64 is present (required for ARM64/AArch64 platforms)
            if ! echo "${ARCHITECTURES}" | grep -q "arm64"; then
              echo "::error::Tag ${TAG} in Aliyun ACR does not contain arm64 architecture"
              exit 1
            fi

            echo "✓ Tag ${TAG} contains both amd64 and arm64 architectures"
          done

          echo "Aliyun ACR image verification completed!"

      - name: Logout from Aliyun ACR
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}
          logout: true

      - name: Summary
        if: steps.config.outputs.version != 'latest'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          PLATFORM="${{ steps.config.outputs.platform }}"
          DRY_RUN="${{ inputs.dry_run }}"

          # Remove v prefix for display
          CLEAN_VERSION="${VERSION#v}"

          # Parse version parts
          MAJOR=$(echo ${CLEAN_VERSION} | cut -d. -f1)
          MINOR=$(echo ${CLEAN_VERSION} | cut -d. -f2)

          # Check if this is a stable release
          IS_STABLE=true
          if [[ ${CLEAN_VERSION} =~ ^(rc|beta|alpha|preview|dev)[0-9]*$ ]] || [[ ${CLEAN_VERSION} =~ -(rc|beta|alpha|preview|dev) ]] || [[ ${CLEAN_VERSION} =~ (rc|beta|alpha|preview|dev)- ]]; then
            IS_STABLE=false
          fi

          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${PLATFORM}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: ${DRY_RUN}" >> $GITHUB_STEP_SUMMARY
          echo "- **Azure Registry**: ${{ secrets.AZURE_ACR_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Aliyun Registry**: ${{ env.ALIYUN_ACR_REGISTRY }}" >> $GITHUB_STEP_SUMMARY

          if [ "${VERSION}" = "latest" ]; then
            echo "- **Status**: Test mode (no images built)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: Build and push completed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Azure ACR Tags" >> $GITHUB_STEP_SUMMARY
            echo "- \`base\` - Base image" >> $GITHUB_STEP_SUMMARY
            echo "- \`${CLEAN_VERSION}\` - Version tag" >> $GITHUB_STEP_SUMMARY
            echo "- \`${MAJOR}.${MINOR}\` - Major.minor tag" >> $GITHUB_STEP_SUMMARY
            echo "- \`${MAJOR}\` - Major tag" >> $GITHUB_STEP_SUMMARY
            if [ "$IS_STABLE" = "true" ]; then
              echo "- \`latest\` - Latest tag (stable release)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- \`latest\` - Skipped (pre-release version)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Aliyun ACR Tags" >> $GITHUB_STEP_SUMMARY
            ALIYUN_FULL_IMAGE="${{ env.ALIYUN_ACR_REGISTRY }}/${{ env.ALIYUN_ACR_NAMESPACE }}/${IMAGE_NAME}"
            echo "- \`base\` - Base image" >> $GITHUB_STEP_SUMMARY
            echo "- \`${CLEAN_VERSION}\` - Version tag" >> $GITHUB_STEP_SUMMARY
            echo "- \`${MAJOR}.${MINOR}\` - Major.minor tag" >> $GITHUB_STEP_SUMMARY
            echo "- \`${MAJOR}\` - Major tag" >> $GITHUB_STEP_SUMMARY
            if [ "$IS_STABLE" = "true" ]; then
              echo "- \`latest\` - Latest tag (stable release)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- \`latest\` - Skipped (pre-release version)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Full Aliyun Image Name**: \`${ALIYUN_FULL_IMAGE}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate Publish Result JSON
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        id: generate-publish-result
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          IMAGE_NAME="hagicode"
          AZURE_REGISTRY="${{ secrets.AZURE_ACR_REGISTRY }}"
          ALIYUN_REGISTRY="${{ env.ALIYUN_ACR_REGISTRY }}"
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GITHUB_RUN_ID="${{ github.run_id }}"
          GITHUB_REPO="${{ github.repository }}"
          GITHUB_SERVER_URL="${{ github.server_url }}"

          # Remove v prefix from VERSION for internal processing
          CLEAN_VERSION="${VERSION#v}"

          # Parse version parts
          MAJOR=$(echo ${CLEAN_VERSION} | cut -d. -f1)
          MINOR=$(echo ${CLEAN_VERSION} | cut -d. -f2)

          # Check if this is a stable release (not pre-release)
          IS_STABLE=true
          if [[ ${CLEAN_VERSION} =~ ^(rc|beta|alpha|preview|dev)[0-9]*$ ]] || [[ ${CLEAN_VERSION} =~ -(rc|beta|alpha|preview|dev) ]] || [[ ${CLEAN_VERSION} =~ (rc|beta|alpha|preview|dev)- ]]; then
            IS_STABLE=false
          fi

          # Aliyun image name includes namespace
          ALIYUN_IMAGE_NAME="${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/${IMAGE_NAME}"

          # Build Azure images array - only include tags that were actually pushed
          if [ "$IS_STABLE" = "true" ]; then
            # Stable release: includes base, version, major.minor, major, latest
            AZURE_IMAGES_JSON='[
              {"name": "'${IMAGE_NAME}'", "tag": "base", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:base'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${CLEAN_VERSION}'", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}.${MINOR}'", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:${MAJOR}.${MINOR}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}'", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:${MAJOR}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "latest", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:latest'"}
            ]'
            ALIYUN_IMAGES_JSON='[
              {"name": "'${IMAGE_NAME}'", "tag": "base", "fullUrl": "'${ALIYUN_IMAGE_NAME}:base'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${CLEAN_VERSION}'", "fullUrl": "'${ALIYUN_IMAGE_NAME}:${CLEAN_VERSION}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}.${MINOR}'", "fullUrl": "'${ALIYUN_IMAGE_NAME}:${MAJOR}.${MINOR}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}'", "fullUrl": "'${ALIYUN_IMAGE_NAME}:${MAJOR}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "latest", "fullUrl": "'${ALIYUN_IMAGE_NAME}:latest'"}
            ]'
          else
            # Pre-release: includes base, version, major.minor, major (no latest)
            AZURE_IMAGES_JSON='[
              {"name": "'${IMAGE_NAME}'", "tag": "base", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:base'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${CLEAN_VERSION}'", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:${CLEAN_VERSION}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}.${MINOR}'", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:${MAJOR}.${MINOR}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}'", "fullUrl": "'${AZURE_REGISTRY}/${IMAGE_NAME}:${MAJOR}'"}
            ]'
            ALIYUN_IMAGES_JSON='[
              {"name": "'${IMAGE_NAME}'", "tag": "base", "fullUrl": "'${ALIYUN_IMAGE_NAME}:base'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${CLEAN_VERSION}'", "fullUrl": "'${ALIYUN_IMAGE_NAME}:${CLEAN_VERSION}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}.${MINOR}'", "fullUrl": "'${ALIYUN_IMAGE_NAME}:${MAJOR}.${MINOR}'"},
              {"name": "'${IMAGE_NAME}'", "tag": "'${MAJOR}'", "fullUrl": "'${ALIYUN_IMAGE_NAME}:${MAJOR}'"}
            ]'
          fi

          # Generate JSON using jq
          jq -n \
            --arg version "${CLEAN_VERSION}" \
            --arg publishedAt "${PUBLISHED_AT}" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg runUrl "${GITHUB_SERVER_URL}/${GITHUB_REPO}/actions/runs/${GITHUB_RUN_ID}" \
            --arg repository "${GITHUB_REPO}" \
            --arg azureRegistry "${AZURE_REGISTRY}" \
            --arg aliyunRegistry "${ALIYUN_REGISTRY}" \
            --argjson azureImages "${AZURE_IMAGES_JSON}" \
            --argjson aliyunImages "${ALIYUN_IMAGES_JSON}" \
            '{
              version: $version,
              publishedAt: $publishedAt,
              github: {
                runId: $runId,
                runUrl: $runUrl,
                repository: $repository
              },
              azure: {
                registry: $azureRegistry,
                images: $azureImages
              },
              aliyun: {
                registry: $aliyunRegistry,
                images: $aliyunImages
              }
            }' > publish-results-${CLEAN_VERSION}.json

          echo "Generated publish result JSON:"
          cat publish-results-${CLEAN_VERSION}.json
          echo "publish_result_file=publish-results-${CLEAN_VERSION}.json" >> $GITHUB_OUTPUT
          echo "clean_version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT

      - name: Upload Publish Result to GitHub Release
        if: steps.config.outputs.version != 'latest' && (inputs.dry_run != 'true')
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          CLEAN_VERSION="${{ steps.generate-publish-result.outputs.clean_version }}"
          FILE_NAME="publish-results-${CLEAN_VERSION}.json"

          # Use VERSION as release tag - add v prefix if not present
          RELEASE_TAG="${VERSION}"
          if [[ ! "${VERSION}" =~ ^v ]]; then
            RELEASE_TAG="v${VERSION}"
          fi

          echo "Uploading ${FILE_NAME} to release ${RELEASE_TAG}..."

          # Check if release exists
          RELEASE_DATA=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}")

          if echo "$RELEASE_DATA" | grep -q "Not Found"; then
            echo "Release ${RELEASE_TAG} not found - skipping upload"
            echo "The release will be created by github-release-workflow.yml"
            echo "You can manually upload the file after the release is created"
          else
            RELEASE_ID=$(echo "$RELEASE_DATA" | jq -r '.id')
            UPLOAD_URL="${{ github.api_url }}/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets"

            # Upload the file
            curl -s -X POST \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Content-Type: application/json" \
              --data-binary "@${FILE_NAME}" \
              "${UPLOAD_URL}?name=${FILE_NAME}"

            echo "Successfully uploaded ${FILE_NAME} to release ${RELEASE_TAG}"
          fi
